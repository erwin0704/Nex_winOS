<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Detail Produk — Studio Kamu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .main { max-width: 820px; margin: 0 auto; padding: 32px 24px 60px; }
    .back-link { font-size: 13px; color: var(--ink-soft); margin-bottom: 20px; display: inline-flex; align-items: center; gap: 6px; }
    .back-link:hover { color: var(--accent); }

    .produk-header { display: flex; gap: 20px; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 28px; }
    .produk-thumb-big { width: 90px; height: 90px; border-radius: var(--radius-sm); flex-shrink: 0; background: linear-gradient(135deg, var(--accent-soft), #F5F3FF); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); color: var(--accent); font-size: 12px; overflow: hidden; }
    .produk-thumb-big img { width: 100%; height: 100%; object-fit: cover; }
    .produk-header h1 { font-size: 22px; margin-bottom: 4px; }
    .produk-header p { font-size: 13px; margin-bottom: 0; }

    .expired-banner { background: #FEF2F2; border: 1px solid #FECACA; color: var(--danger); padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; }

    .modul-block { margin-bottom: 16px; }
    .modul-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; }
    .modul-head h3 { font-size: 15px; margin: 0; }
    .modul-head .toggle-ic { color: var(--accent); transition: transform 0.2s ease; }
    .modul-block.open .modul-head .toggle-ic { transform: rotate(180deg); }
    .modul-head .modul-count { font-size: 12px; color: var(--ink-soft); }
    .modul-konten-list { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
    .modul-block.open .modul-konten-list { max-height: 1200px; }

    .konten-item { display: flex; align-items: center; gap: 12px; padding: 13px 18px; margin-top: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
    .konten-item .ic { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
    .konten-item .konten-info { flex: 1; min-width: 0; }
    .konten-item .konten-judul { font-size: 14px; font-weight: 500; }
    .konten-item .konten-tipe { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.03em; }
    .konten-item.selesai { border-color: #A7F3D0; background: #F0FDF9; }
    .check-btn { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; }
    .check-btn.checked { background: var(--success); border-color: var(--success); color: #fff; }
  </style>
</head>
<body>
  <main class="main">
    <a href="dashboard.html" class="back-link">← Kembali ke Dashboard</a>
    <div id="content">
      <div class="empty-state">Memuat data produk...</div>
    </div>
  </main>

  <script src="assets/api.js"></script>
  <script>
    if (requireAuth()) {
      const params = new URLSearchParams(window.location.search);
      const produkId = params.get('id');
      loadProduk(produkId);
    }

    async function loadProduk(produkId) {
      const contentEl = document.getElementById('content');
      try {
        const res = await apiGet('getProdukDetail', { produkId: produkId });
        if (!res.success || !res.data.access) {
          contentEl.innerHTML =
            '<div class="empty-state">' +
            '<h3 style="margin-bottom:8px;">🔒 Kamu tidak memiliki akses ke produk ini</h3>' +
            '<p style="font-size:13px;">Kalau menurutmu ini keliru, hubungi admin untuk pengecekan.</p>' +
            '<a href="dashboard.html" class="btn btn-primary btn-sm" style="margin-top:8px;">Kembali ke Dashboard</a>' +
            '</div>';
          return;
        }

        const d = res.data;
        let html = '';

        if (d.expired) {
          html += '<div class="expired-banner">⚠️ Akses ke produk ini sudah kedaluwarsa. Hubungi admin untuk perpanjangan.</div>';
        }

        const thumb = d.produk.thumbnail
          ? '<img src="' + d.produk.thumbnail + '" alt="' + d.produk.nama + '">'
          : (d.produk.kategori || 'PRODUK');

        html +=
          '<div class="produk-header">' +
          '<div class="produk-thumb-big">' + thumb + '</div>' +
          '<div><h1>' + d.produk.nama + '</h1><p>' + (d.produk.deskripsi || '') + '</p></div>' +
          '</div>';

        if (d.modules.length === 0) {
          html += '<div class="empty-state">Belum ada modul yang ditambahkan untuk produk ini.</div>';
        } else {
          d.modules.forEach(function (m, i) {
            html += '<div class="modul-block ' + (i === 0 ? 'open' : '') + '">' +
              '<div class="modul-head" onclick="this.parentElement.classList.toggle(\'open\')">' +
              '<h3>📖 ' + m.nama_modul + '</h3>' +
              '<div style="display:flex;align-items:center;gap:10px;"><span class="modul-count">' + m.konten.length + ' item</span><span class="toggle-ic">▾</span></div>' +
              '</div><div class="modul-konten-list">';

            if (m.konten.length === 0) {
              html += '<div class="empty-state" style="margin-top:6px;padding:20px;">Belum ada konten di modul ini.</div>';
            } else {
              m.konten.forEach(function (k) {
                const icon = k.tipe === 'video' ? '▶️' : (k.tipe === 'pdf' ? '📄' : (k.tipe === 'prompt' ? '📋' : '📥'));
                const actionBtn = k.tipe === 'video'
                  ? '<a href="video.html?id=' + k.id + '" class="btn btn-outline btn-sm">Tonton</a>'
                  : '<a href="' + k.url + '" target="_blank" rel="noopener" class="btn btn-outline btn-sm">Buka</a>';

                html += '<div class="konten-item ' + (k.selesai ? 'selesai' : '') + '" id="konten-' + k.id + '">' +
                  '<span class="ic">' + icon + '</span>' +
                  '<div class="konten-info"><div class="konten-judul">' + k.judul + '</div><div class="konten-tipe">' + k.tipe + '</div></div>' +
                  actionBtn +
                  '<button class="check-btn ' + (k.selesai ? 'checked' : '') + '" onclick="toggleSelesai(\'' + k.id + '\', this)" title="Tandai selesai">✓</button>' +
                  '</div>';
              });
            }
            html += '</div></div>';
          });
        }

        contentEl.innerHTML = html;

      } catch (err) {
        contentEl.innerHTML = '<div class="empty-state">Gagal memuat data. Coba muat ulang halaman.</div>';
      }
    }

    async function toggleSelesai(kontenId, btnEl) {
      const itemEl = document.getElementById('konten-' + kontenId);
      const isNowChecked = !btnEl.classList.contains('checked');

      btnEl.classList.toggle('checked', isNowChecked);
      itemEl.classList.toggle('selesai', isNowChecked);
      showLoading('Menyimpan progress...');

      try {
        const res = await apiPost('setKontenProgress', { kontenId: kontenId, selesai: isNowChecked });
        hideLoading();
        if (!res.success) throw new Error(res.message || 'Gagal menyimpan.');
      } catch (err) {
        hideLoading();
        btnEl.classList.toggle('checked', !isNowChecked);
        itemEl.classList.toggle('selesai', !isNowChecked);
        alert('Gagal menyimpan progress: ' + err.message);
      }
    }
  </script>
</body>
</html>
