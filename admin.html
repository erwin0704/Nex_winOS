<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Panel — Studio Kamu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .content-inner { max-width: 1000px; }
    .admin-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
    .admin-tab {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 16px; border-radius: 99px; font-size: 13px; font-weight: 600;
      border: 1px solid var(--border); background: var(--surface); color: var(--ink-soft); cursor: pointer;
    }
    .admin-tab svg { width: 15px; height: 15px; }
    .admin-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .admin-tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
    .tab-view { display: none; }
    .tab-view.active { display: block; }
    .breadcrumb { font-size: 13px; color: var(--ink-soft); margin-bottom: 14px; }
    .breadcrumb a { color: var(--accent); cursor: pointer; }
  </style>
</head>
<body class="app-page">
  <div class="app-shell">
    <div id="sidebarMount"></div>
    <main class="main">
      <div class="content-inner">
        <h1 class="page-title">⚙️ Admin Panel</h1>

        <div class="admin-tabs" id="adminTabs"></div>

        <!-- ========== STATISTIK ========== -->
        <div class="tab-view active" id="tab-statistik">
          <div class="stat-grid" id="statGrid">
            <div class="stat-card"><div class="stat-num">…</div><div class="stat-label">Memuat</div></div>
          </div>
        </div>

        <!-- ========== PRODUK & KONTEN ========== -->
        <div class="tab-view" id="tab-produk">
          <div class="breadcrumb" id="produkBreadcrumb"></div>
          <div id="produkArea"></div>
        </div>

        <!-- ========== PROMPT LIBRARY ========== -->
        <div class="tab-view" id="tab-prompt">
          <div class="panel">
            <div class="panel-head"><h3>Tambah Prompt Baru</h3></div>
            <div class="form-row">
              <div><label>Untuk Produk</label><select id="promptProduk"></select></div>
              <div><label>Kategori</label><input id="promptKategori" placeholder="Contoh: Copywriting, SEO"></div>
            </div>
            <div class="form-row single"><div><label>Judul Prompt</label><input id="promptJudul"></div></div>
            <div class="form-row single"><div><label>Isi Prompt</label><textarea id="promptIsi" style="min-height:100px;"></textarea></div></div>
            <button class="btn btn-primary btn-sm" onclick="createPrompt()">Tambah Prompt</button>
          </div>
          <div class="panel">
            <div class="panel-head"><h3>Daftar Prompt</h3></div>
            <table><thead><tr><th>Judul</th><th>Kategori</th><th>Produk</th><th></th></tr></thead><tbody id="promptTable"></tbody></table>
          </div>
        </div>

        <!-- ========== KODE AKSES ========== -->
        <div class="tab-view" id="tab-kodeakses">
          <div class="panel">
            <div class="panel-head"><h3>Generate Kode Akses Baru</h3></div>
            <div class="form-row">
              <div><label>Untuk Produk</label><select id="genKodeProduk"></select></div>
              <div><label>Jumlah Kode</label><input type="number" id="genKodeJumlah" value="1" min="1" max="100"></div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="generateKode()">Generate Kode</button>
          </div>
          <div class="panel">
            <div class="panel-head"><h3>Daftar Kode Akses</h3></div>
            <table><thead><tr><th>Kode</th><th>Produk</th><th>Status</th><th>Dipakai Oleh</th><th></th></tr></thead><tbody id="kodeAksesTable"></tbody></table>
          </div>
        </div>

        <!-- ========== USERS ========== -->
        <div class="tab-view" id="tab-users">
          <div class="panel">
            <table><thead><tr><th>Nama</th><th>Email</th><th>Role</th><th>Status</th><th>Terakhir Login</th><th></th></tr></thead><tbody id="usersTable"></tbody></table>
          </div>
        </div>

        <!-- ========== UPDATE ========== -->
        <div class="tab-view" id="tab-update">
          <div class="panel">
            <div class="panel-head"><h3>Tulis Update Baru</h3></div>
            <div class="form-row single"><div><label>Judul</label><input id="updateJudul"></div></div>
            <div class="form-row single"><div><label>Isi</label><textarea id="updateIsi"></textarea></div></div>
            <button class="btn btn-primary btn-sm" onclick="createUpdate()">Publikasikan</button>
          </div>
          <div class="panel">
            <div class="panel-head"><h3>Riwayat Update</h3></div>
            <table><thead><tr><th>Judul</th><th>Tanggal</th><th></th></tr></thead><tbody id="updateTable"></tbody></table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="assets/api.js"></script>
  <script>
    const STATE = { produkList: [], selectedProduk: null, modulList: [], selectedModul: null, kontenList: [] };

    /* ---------------- TAB NAVIGASI ---------------- */
    const TABS = [
      { key: 'statistik', label: 'Statistik', icon: 'chart' },
      { key: 'produk', label: 'Produk & Konten', icon: 'box' },
      { key: 'prompt', label: 'Prompt Library', icon: 'list' },
      { key: 'kodeakses', label: 'Kode Akses', icon: 'key' },
      { key: 'users', label: 'Users', icon: 'users' },
      { key: 'update', label: 'Update', icon: 'bell' }
    ];

    if (requireAdmin()) {
      try {
        mountSidebar('admin');
        initAdminTabs();
        loadStatistik();
      } catch (err) {
        console.error('Admin init error:', err);
        document.getElementById('adminTabs').innerHTML =
          '<div class="empty-state" style="grid-column:1/-1;border-color:#F0506E;">⚠️ Gagal memuat Admin Panel: ' + err.message +
          '<br><small>Coba hard refresh (Ctrl+Shift+R). Kalau masih error, pastikan file assets/api.js di GitHub sudah versi terbaru.</small></div>';
      }
    }

    function initAdminTabs() {
      document.getElementById('adminTabs').innerHTML = TABS.map(function (t, i) {
        return '<button class="admin-tab ' + (i === 0 ? 'active' : '') + '" data-tab="' + t.key + '" onclick="switchAdminTab(\'' + t.key + '\')">' +
          (ICONS[t.icon] || '') + '<span>' + t.label + '</span></button>';
      }).join('');
    }

    function switchAdminTab(tab) {
      document.querySelectorAll('.admin-tab').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === tab); });
      document.querySelectorAll('.tab-view').forEach(function (v) { v.classList.remove('active'); });
      document.getElementById('tab-' + tab).classList.add('active');
      showLoading('Memuat data...');
      loadTab(tab);
    }

    function loadTab(tab) {
      if (tab === 'statistik') loadStatistik();
      if (tab === 'produk') loadProdukList();
      if (tab === 'prompt') loadPromptLibrary();
      if (tab === 'kodeakses') loadKodeAkses();
      if (tab === 'users') loadUsers();
      if (tab === 'update') loadUpdate();
    }

    /* ---------------- STATISTIK ---------------- */
    async function loadStatistik() {
      try {
        const res = await apiGet('adminGetStatistik', {});
        hideLoading();
        if (!res.success) { showToast('Gagal memuat statistik: ' + res.message); return; }
        const s = res.data || {};
        document.getElementById('statGrid').innerHTML =
          statCard(s.totalUser, 'Total User') +
          statCard(s.userAktif, 'User Aktif') +
          statCard(s.totalProduk, 'Total Produk') +
          statCard((s.kodeTerpakai || 0) + ' / ' + (s.totalKodeAkses || 0), 'Kode Akses Terpakai') +
          statCard(s.loginMingguIni, 'Login 7 Hari Terakhir');
      } catch (err) {
        hideLoading();
        showToast('Gagal terhubung ke server: ' + err.message);
      }
    }
    function statCard(num, label) {
      return '<div class="stat-card"><div class="stat-num">' + num + '</div><div class="stat-label">' + label + '</div></div>';
    }

    /* ---------------- PRODUK, MODUL, KONTEN ---------------- */
    async function loadProdukList() {
      STATE.selectedProduk = null; STATE.selectedModul = null;
      document.getElementById('produkBreadcrumb').innerHTML = '';
      try {
        const res = await apiGet('adminGetAllProduk', {});
        hideLoading();
        STATE.produkList = res.data || [];
        renderProdukList();
      } catch (err) {
        hideLoading();
        showToast('Gagal memuat produk: ' + err.message);
      }
    }

    function renderProdukList() {
      let html = '<div class="panel"><div class="panel-head"><h3>Tambah Produk Baru</h3></div>' +
        '<div class="form-row"><div><label>Nama Produk</label><input id="pNama"></div>' +
        '<div><label>Kategori</label><input id="pKategori" placeholder="Contoh: Video Course"></div></div>' +
        '<div class="form-row single"><div><label>Deskripsi</label><textarea id="pDeskripsi"></textarea></div></div>' +
        '<div class="form-row single"><div><label>URL Thumbnail (opsional)</label><input id="pThumbnail" placeholder="https://..."></div></div>' +
        '<button class="btn btn-primary btn-sm" onclick="createProduk()">Tambah Produk</button></div>';

      html += '<div class="panel"><div class="panel-head"><h3>Daftar Produk</h3></div><table><thead><tr><th>Nama</th><th>Kategori</th><th></th></tr></thead><tbody>';
      if (STATE.produkList.length === 0) {
        html += '<tr class="empty-row"><td colspan="3">Belum ada produk.</td></tr>';
      } else {
        STATE.produkList.forEach(function (p) {
          html += '<tr><td>' + p.nama + '</td><td>' + (p.kategori || '-') + '</td><td class="row-actions">' +
            '<button class="btn btn-outline btn-sm" onclick="openModul(\'' + p.id + '\', \'' + escapeQ(p.nama) + '\')">Kelola Modul</button>' +
            '<button class="btn btn-outline btn-sm" onclick="deleteProduk(\'' + p.id + '\')">Hapus</button></td></tr>';
        });
      }
      html += '</tbody></table></div>';
      document.getElementById('produkArea').innerHTML = html;
    }

    function escapeQ(str) { return String(str).replace(/'/g, "\\'"); }

    async function createProduk() {
      const data = {
        nama: document.getElementById('pNama').value,
        kategori: document.getElementById('pKategori').value,
        deskripsi: document.getElementById('pDeskripsi').value,
        thumbnail: document.getElementById('pThumbnail').value
      };
      if (!data.nama) { showToast('Nama produk wajib diisi.'); return; }
      showLoading('Menyimpan produk...');
      try {
        const res = await apiPost('adminCreateProduk', { data: data });
        if (!res.success) throw new Error(res.message);
        showToast('Produk berhasil ditambahkan.');
        loadProdukList();
      } catch (err) { showToast('Gagal: ' + err.message); }
    }

    async function deleteProduk(id) {
      if (!confirm('Hapus produk ini? Modul & konten di dalamnya tidak otomatis terhapus.')) return;
      showLoading('Menghapus produk...');
      try {
        const res = await apiPost('adminDeleteProduk', { produkId: id });
        if (!res.success) throw new Error(res.message);
        showToast('Produk dihapus.');
        loadProdukList();
      } catch (err) { showToast('Gagal: ' + err.message); }
    }

    async function openModul(produkId, produkNama) {
      STATE.selectedProduk = { id: produkId, nama: produkNama };
      document.getElementById('produkBreadcrumb').innerHTML = '<a onclick="loadProdukList()">Produk</a> / ' + produkNama;
      showLoading('Memuat modul...');
      try {
        const res = await apiGet('adminGetModulByProduk', { produkId: produkId });
        hideLoading();
        STATE.modulList = res.data || [];
        renderModulList();
      } catch (err) { hideLoading(); showToast('Gagal memuat modul: ' + err.message); }
    }

    function renderModulList() {
      let html = '<div class="panel"><div class="panel-head"><h3>Tambah Modul</h3></div>' +
        '<div class="form-row"><div><label>Nama Modul</label><input id="mNama"></div>' +
        '<div><label>Urutan</label><input type="number" id="mUrutan" value="1"></div></div>' +
        '<button class="btn btn-primary btn-sm" onclick="createModul()">Tambah Modul</button></div>';

      html += '<div class="panel"><div class="panel-head"><h3>Daftar Modul</h3></div><table><thead><tr><th>Nama Modul</th><th>Urutan</th><th></th></tr></thead><tbody>';
      if (STATE.modulList.length === 0) {
        html += '<tr class="empty-row"><td colspan="3">Belum ada modul untuk produk ini.</td></tr>';
      } else {
        STATE.modulList.forEach(function (m) {
          html += '<tr><td>' + m.nama_modul + '</td><td>' + m.urutan + '</td><td class="row-actions">' +
            '<button class="btn btn-outline btn-sm" onclick="openKonten(\'' + m.id + '\', \'' + escapeQ(m.nama_modul) + '\')">Kelola Konten</button>' +
            '<button class="btn btn-outline btn-sm" onclick="deleteModul(\'' + m.id + '\')">Hapus</button></td></tr>';
        });
      }
      html += '</tbody></table></div>';
      document.getElementById('produkArea').innerHTML = html;
    }

    async function createModul() {
      const data = {
        produk_id: STATE.selectedProduk.id,
        nama_modul: document.getElementById('mNama').value,
        urutan: parseInt(document.getElementById('mUrutan').value, 10) || 0
      };
      if (!data.nama_modul) { showToast('Nama modul wajib diisi.'); return; }
      showLoading('Menyimpan modul...');
      try {
        const res = await apiPost('adminCreateModul', { data: data });
        if (!res.success) throw new Error(res.message);
        showToast('Modul ditambahkan.');
        openModul(STATE.selectedProduk.id, STATE.selectedProduk.nama);
      } catch (err) { showToast('Gagal: ' + err.message); }
    }

    async function deleteModul(id) {
      if (!confirm('Hapus modul ini?')) return;
      showLoading('Menghapus modul...');
      try {
        const res = await apiPost('adminDeleteModul', { modulId: id });
        if (!res.success) throw new Error(res.message);
        showToast('Modul dihapus.');
        openModul(STATE.selectedProduk.id, STATE.selectedProduk.nama);
      } catch (err) { showToast('Gagal: ' + err.message); }
    }

    async function openKonten(modulId, modulNama) {
      STATE.selectedModul = { id: modulId, nama: modulNama };
      document.getElementById('produkBreadcrumb').innerHTML =
        '<a onclick="loadProdukList()">Produk</a> / ' +
        '<a onclick="openModul(\'' + STATE.selectedProduk.id + '\', \'' + escapeQ(STATE.selectedProduk.nama) + '\')">' + STATE.selectedProduk.nama + '</a> / ' + modulNama;
      showLoading('Memuat konten...');
      try {
        const res = await apiGet('adminGetKontenByModul', { modulId: modulId });
        hideLoading();
        STATE.kontenList = res.data || [];
        renderKontenList();
      } catch (err) { hideLoading(); showToast('Gagal memuat konten: ' + err.message); }
    }

    function renderKontenList() {
      let html = '<div class="panel"><div class="panel-head"><h3>Tambah Konten</h3></div>' +
        '<div class="form-row"><div><label>Tipe</label><select id="kTipe">' +
        '<option value="video">Video</option><option value="pdf">PDF / Dokumen</option>' +
        '<option value="prompt">Prompt</option><option value="template">Template</option></select></div>' +
        '<div><label>Urutan</label><input type="number" id="kUrutan" value="1"></div></div>' +
        '<div class="form-row single"><div><label>Judul</label><input id="kJudul"></div></div>' +
        '<div class="form-row single"><div><label>URL (link Google Drive / video)</label><input id="kUrl" placeholder="https://drive.google.com/..."></div></div>' +
        '<button class="btn btn-primary btn-sm" onclick="createKonten()">Tambah Konten</button></div>';

      html += '<div class="panel"><div class="panel-head"><h3>Daftar Konten</h3></div><table><thead><tr><th>Tipe</th><th>Judul</th><th></th></tr></thead><tbody>';
      if (STATE.kontenList.length === 0) {
        html += '<tr class="empty-row"><td colspan="3">Belum ada konten di modul ini.</td></tr>';
      } else {
        STATE.kontenList.forEach(function (k) {
          html += '<tr><td><span class="chip">' + k.tipe + '</span></td><td>' + k.judul + '</td><td class="row-actions">' +
            '<button class="btn btn-outline btn-sm" onclick="deleteKonten(\'' + k.id + '\')">Hapus</button></td></tr>';
        });
      }
      html += '</tbody></table></div>';
      document.getElementById('produkArea').innerHTML = html;
    }

    async function createKonten() {
      const data = {
        modul_id: STATE.selectedModul.id,
        tipe: document.getElementById('kTipe').value,
        judul: document.getElementById('kJudul').value,
        url: document.getElementById('kUrl').value,
        urutan: parseInt(document.getElementById('kUrutan').value, 10) || 0
      };
      if (!data.judul || !data.url) { showToast('Judul dan URL wajib diisi.'); return; }
      showLoading('Menyimpan konten...');
      try {
        const res = await apiPost('adminCreateKonten', { data: data });
        if (!res.success) throw new Error(res.message);
        showToast('Konten ditambahkan.');
        openKonten(STATE.selectedModul.id, STATE.selectedModul.nama);
      } catch (err) { showToast('Gagal: ' + err.message); }
    }

    async function deleteKonten(id) {
      if (!confirm('Hapus konten ini?')) return;
      showLoading('Menghapus konten...');
      try {
        const res = await apiPost('adminDeleteKonten', { kontenId: id });
        if (!res.success) throw new Error(res.message);
        showToast('Konten dihapus.');
        openKonten(STATE.selectedModul.id, STATE.selectedModul.nama);
      } catch (err) { showToast('Gagal: ' + err.message); }
    }

    /* ---------------- PROMPT LIBRARY ---------------- */
    async function loadPromptLibrary() {
      try {
        const resProduk = await apiGet('adminGetAllProduk', {});
        const sel = document.getElementById('promptProduk');
        sel.innerHTML = (resProduk.data || []).map(function (p) { return '<option value="' + p.id + '">' + p.nama + '</option>'; }).join('');

        const res = await apiGet('adminGetAllPrompt', {});
        hideLoading();
        const list = res.data || [];
        const tbody = document.getElementById('promptTable');
        if (list.length === 0) {
          tbody.innerHTML = '<tr class="empty-row"><td colspan="4">Belum ada prompt.</td></tr>';
          return;
        }
        tbody.innerHTML = list.map(function (p) {
          return '<tr><td>' + p.judul + '</td><td><span class="chip">' + (p.kategori || 'Umum') + '</span></td><td>' + (p.produk_id || '-') + '</td>' +
            '<td><button class="btn btn-outline btn-sm" onclick="deletePrompt(\'' + p.id + '\')">Hapus</button></td></tr>';
        }).join('');
      } catch (err) { hideLoading(); showToast('Gagal memuat prompt: ' + err.message); }
    }

    async function createPrompt() {
      const data = {
        produk_id: document.getElementById('promptProduk').value,
        kategori: document.getElementById('promptKategori').value,
        judul: document.getElementById('promptJudul').value,
        isi_prompt: document.getElementById('promptIsi').value
      };
      if (!data.produk_id) { showToast('Buat produk terlebih dahulu.'); return; }
      if (!data.judul || !data.isi_prompt) { showToast('Judul dan isi prompt wajib diisi.'); return; }
      showLoading('Menyimpan prompt...');
      try {
        const res = await apiPost('adminCreatePrompt', { data: data });
        if (!res.success) throw new Error(res.message);
        showToast('Prompt berhasil ditambahkan.');
        document.getElementById('promptJudul').value = '';
        document.getElementById('promptIsi').value = '';
        document.getElementById('promptKategori').value = '';
        loadPromptLibrary();
      } catch (err) { showToast('Gagal: ' + err.message); }
    }

    async function deletePrompt(id) {
      if (!confirm('Hapus prompt ini?')) return;
      showLoading('Menghapus prompt...');
      try {
        const res = await apiPost('adminDeletePrompt', { promptId: id });
        if (!res.success) throw new Error(res.message);
        showToast('Prompt dihapus.');
        loadPromptLibrary();
      } catch (err) { showToast('Gagal: ' + err.message); }
    }

    /* ---------------- KODE AKSES ---------------- */
    async function loadKodeAkses() {
      try {
        const resProduk = await apiGet('adminGetAllProduk', {});
        const sel = document.getElementById('genKodeProduk');
        sel.innerHTML = (resProduk.data || []).map(function (p) { return '<option value="' + p.id + '">' + p.nama + '</option>'; }).join('');

        const res = await apiGet('adminGetAllKodeAkses', {});
        hideLoading();
        const list = res.data || [];
        const tbody = document.getElementById('kodeAksesTable');
        if (list.length === 0) {
          tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Belum ada kode akses.</td></tr>';
          return;
        }
        tbody.innerHTML = list.map(function (k) {
          const status = k.status_pakai === 'terpakai' ? '<span class="badge nonaktif">Terpakai</span>' : '<span class="badge aktif">Tersedia</span>';
          return '<tr><td class="code-mono">' + k.kode + '</td><td>' + (k.produk_id || '-') + '</td><td>' + status + '</td><td>' + (k.dipakai_oleh || '-') + '</td>' +
            '<td><button class="btn btn-outline btn-sm" onclick="deleteKode(\'' + k.kode + '\')">Hapus</button></td></tr>';
        }).join('');
      } catch (err) { hideLoading(); showToast('Gagal memuat kode akses: ' + err.message); }
    }

    async function generateKode() {
      const produkId = document.getElementById('genKodeProduk').value;
      const jumlah = parseInt(document.getElementById('genKodeJumlah').value, 10) || 1;
      if (!produkId) { showToast('Buat produk terlebih dahulu.'); return; }
      showLoading('Membuat kode akses...');
      try {
        const res = await apiPost('adminGenerateKodeAkses', { produkId: produkId, jumlah: jumlah });
        if (!res.success) throw new Error(res.message);
        showToast(res.kodeList.length + ' kode berhasil dibuat.');
        loadKodeAkses();
      } catch (err) { showToast('Gagal: ' + err.message); }
    }

    async function deleteKode(kode) {
      if (!confirm('Hapus kode akses ini?')) return;
      showLoading('Menghapus kode...');
      try {
        const res = await apiPost('adminDeleteKodeAkses', { kode: kode });
        if (!res.success) throw new Error(res.message);
        showToast('Kode dihapus.');
        loadKodeAkses();
      } catch (err) { showToast('Gagal: ' + err.message); }
    }

    /* ---------------- USERS ---------------- */
    async function loadUsers() {
      try {
        const res = await apiGet('adminGetAllUsers', {});
        hideLoading();
        const list = res.data || [];
        const tbody = document.getElementById('usersTable');
        if (list.length === 0) {
          tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Belum ada user.</td></tr>';
          return;
        }
        tbody.innerHTML = list.map(function (u) {
          const statusBadge = u.status === 'aktif' ? '<span class="badge aktif">Aktif</span>' : '<span class="badge nonaktif">Nonaktif</span>';
          const roleBadge = u.role === 'admin' ? '<span class="badge admin">Admin</span>' : 'Member';
          const toggleLabel = u.status === 'aktif' ? 'Nonaktifkan' : 'Aktifkan';
          const toggleStatus = u.status === 'aktif' ? 'nonaktif' : 'aktif';
          return '<tr><td>' + u.nama + '</td><td>' + u.email + '</td><td>' + roleBadge + '</td><td>' + statusBadge + '</td><td>' + (u.terakhir_login || '-') + '</td>' +
            '<td class="row-actions">' +
            '<button class="btn btn-outline btn-sm" onclick="toggleUserStatus(\'' + u.id + '\', \'' + toggleStatus + '\')">' + toggleLabel + '</button>' +
            '<button class="btn btn-outline btn-sm" onclick="deleteUser(\'' + u.id + '\')">Hapus</button></td></tr>';
        }).join('');
      } catch (err) { hideLoading(); showToast('Gagal memuat user: ' + err.message); }
    }

    async function toggleUserStatus(userId, newStatus) {
      showLoading('Memperbarui status user...');
      try {
        const res = await apiPost('adminSetUserStatus', { userId: userId, status: newStatus });
        if (!res.success) throw new Error(res.message);
        showToast('Status user diperbarui.');
        loadUsers();
      } catch (err) { showToast('Gagal: ' + err.message); }
    }

    async function deleteUser(userId) {
      if (!confirm('Hapus user ini secara permanen?')) return;
      showLoading('Menghapus user...');
      try {
        const res = await apiPost('adminDeleteUser', { userId: userId });
        if (!res.success) throw new Error(res.message);
        showToast('User dihapus.');
        loadUsers();
      } catch (err) { showToast('Gagal: ' + err.message); }
    }

    /* ---------------- UPDATE ---------------- */
    async function loadUpdate() {
      try {
        const res = await apiGet('adminGetAllUpdate', {});
        hideLoading();
        const list = res.data || [];
        const tbody = document.getElementById('updateTable');
        if (list.length === 0) {
          tbody.innerHTML = '<tr class="empty-row"><td colspan="3">Belum ada update.</td></tr>';
          return;
        }
        tbody.innerHTML = list.map(function (u) {
          return '<tr><td>' + u.judul + '</td><td>' + u.tanggal + '</td>' +
            '<td><button class="btn btn-outline btn-sm" onclick="deleteUpdate(\'' + u.id + '\')">Hapus</button></td></tr>';
        }).join('');
      } catch (err) { hideLoading(); showToast('Gagal memuat update: ' + err.message); }
    }

    async function createUpdate() {
      const data = { judul: document.getElementById('updateJudul').value, isi: document.getElementById('updateIsi').value };
      if (!data.judul || !data.isi) { showToast('Judul dan isi wajib diisi.'); return; }
      showLoading('Mempublikasikan update...');
      try {
        const res = await apiPost('adminCreateUpdate', { data: data });
        if (!res.success) throw new Error(res.message);
        showToast('Update dipublikasikan.');
        document.getElementById('updateJudul').value = '';
        document.getElementById('updateIsi').value = '';
        loadUpdate();
      } catch (err) { showToast('Gagal: ' + err.message); }
    }

    async function deleteUpdate(id) {
      if (!confirm('Hapus update ini?')) return;
      showLoading('Menghapus update...');
      try {
        const res = await apiPost('adminDeleteUpdate', { updateId: id });
        if (!res.success) throw new Error(res.message);
        showToast('Update dihapus.');
        loadUpdate();
      } catch (err) { showToast('Gagal: ' + err.message); }
    }
  </script>
</body>
</html>
